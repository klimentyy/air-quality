name: Air Quality ETL CI/CD Pipeline

on:
  push:
    branches: ["main", "feature/*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements-test.txt

      - name: Lint code with Ruff
        run: ruff check src/

      - name: Run pytest suite
        run: pytest -o pythonpath=src tests/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Lambda code and layers
        run: |
          make build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: |
            code_function.zip
            python_layer.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: .

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">= 1.5.8"

      - name: Terraform Init and Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_golemio_api_token: ${{ secrets.GOLEMIO_API_TOKEN }}
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
