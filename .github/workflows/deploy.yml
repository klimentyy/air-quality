name: Air Quality ETL CI/CD Pipeline

on:
  push:
    branches: 
      - "main"
      - "feature/*"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync

      - name: Lint code with Ruff
        run: uv run ruff check src/
      
      - name: Run E2E Pipeline Tests
        run: |
          export PYTHONPATH=src
          pytest tests/test_e2e_pipeline.py -v

      - name: Run pytest suite
        run: uv run pytest -o pythonpath=src tests/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Build Lambda code and layers
        run: |
          make build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: |
            code_function.zip
            python_layer.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment: ${{ github.ref_name == 'main' && 'production' || 'development'}}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: .

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">= 1.5.8"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend-config="key=state/${{ github.ref_name }}/terraform.tfstate" -reconfigure

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Apply
        env:
          TF_VAR_environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
          TF_VAR_golemio_api_token: ${{ secrets.GOLEMIO_API_TOKEN }}
        run: |
          cd terraform
          terraform apply -auto-approve
